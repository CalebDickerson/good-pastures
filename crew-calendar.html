<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Calendar</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
    }
    .app-container {
      background-color: white;
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 24px;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .back-btn {
      text-decoration: none;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
    }
    h2 { margin: 0; font-size: 20px; color: #111827; }
    
    /* Calendar Controls */
    .calendar-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .cal-btn {
      background: none;
      border: none;
      font-size: 18px;
      font-weight: bold;
      color: #1a1b1e;
      cursor: pointer;
      padding: 8px 16px;
    }
    #month-year-display {
      font-weight: bold;
      font-size: 16px;
    }

    /* Calendar Grid */
    .days-of-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f9fafb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .day-cell:active, .day-cell.selected {
      background-color: #1a1b1e;
      color: white;
    }
    .day-cell.empty { background-color: transparent; cursor: default; }

    /* Roster Display area */
    .roster-card {
      margin-top: 24px;
      padding: 16px;
      background-color: #f9fafb;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .roster-date { font-weight: bold; font-size: 16px; margin-bottom: 12px; color: #111827; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; }
    .roster-list { list-style: none; padding: 0; margin: 0; }
    .roster-list li { padding: 4px 0; font-size: 15px; color: #374151; display: flex; align-items: center; }
    .blitz-tag { background-color: #d1fae5; color: #065f46; font-size: 11px; padding: 2px 6px; border-radius: 12px; margin-left: 8px; font-weight: bold; }
    .off-tag { color: #dc2626; font-size: 13px; font-style: italic; margin-left: 8px; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <a href="index.html" class="back-btn">← Back</a>
      <h2>Crew Calendar</h2>
      <div style="width: 45px;"></div>
    </div>

    <div class="calendar-controls">
      <button class="cal-btn" onclick="changeMonth(-1)">❮</button>
      <div id="month-year-display">Loading...</div>
      <button class="cal-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="days-of-week">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    
    <div id="calendar-grid" class="calendar-grid"></div>

    <div id="roster-display" class="roster-card" style="display: none;">
      <div id="roster-date" class="roster-date">Select a Date</div>
      <ul id="roster-list" class="roster-list"></ul>
    </div>
  </div>

  <script>
    // 1. PASTE YOUR UNIQUE GOOGLE WEB APP URL RIGHT HERE:
    const googleScriptURL = "https://script.google.com/macros/s/AKfycbz0Nt27SAcF8Gpz8mThNfpKA455p9uJWjo-zZcL-cv3c0djx6ABXmIbL1DZ3WpiNPWEWg/exec";
    
    // The permanent base crew
    const baseCrew = ["Caleb", "Danny", "Sage", "Emily", "McKinley", "Libbie", "Brandon"];
    
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let allShifts = [];
    let selectedCell = null;

    // Fetch the data from Google Sheets immediately
    function initCalendar() {
      fetch(googleScriptURL)
        .then(response => response.json())
        .then(data => {
          allShifts = data;
          renderCalendar(currentMonth, currentYear);
          
          // Auto-select today's date if viewing the current month
          const today = new Date();
          if(currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
            selectDate(today.getFullYear(), today.getMonth(), today.getDate());
          }
        });
    }

    function renderCalendar(month, year) {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = ''; // Clear old days
      
      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      document.getElementById('month-year-display').innerText = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Pad the start of the grid with empty cells
      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'day-cell empty';
        grid.appendChild(emptyCell);
      }

      // Build the actual days
      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.innerText = day;
        cell.id = `day-${year}-${month}-${day}`;
        cell.onclick = () => selectDate(year, month, day);
        grid.appendChild(cell);
      }
    }

    function changeMonth(direction) {
      currentMonth += direction;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      
      document.getElementById('roster-display').style.display = 'none'; // Hide roster on month change
      renderCalendar(currentMonth, currentYear);
    }

    function selectDate(year, month, day) {
      // Manage CSS highlighting
      if(selectedCell) selectedCell.classList.remove('selected');
      selectedCell = document.getElementById(`day-${year}-${month}-${day}`);
      if(selectedCell) selectedCell.classList.add('selected');

      // Create a clean YYYY-MM-DD string to match the database
      const mStr = String(month + 1).padStart(2, '0');
      const dStr = String(day).padStart(2, '0');
      const targetDateStr = `${year}-${mStr}-${dStr}`;

      // Build the specific roster for this day
      buildRoster(targetDateStr, month, day);
    }

    function buildRoster(targetDateStr, month, day) {
      // 1. Start with the full standard crew
      let workingToday = [...baseCrew];
      let blitzWorkers = [];
      let offWorkers = [];

      // 2. Look at all shifts in the database
      allShifts.forEach(shift => {
        // Clean the DB date to match our target string
        let shiftDateClean = shift.startDate.includes('T') ? shift.startDate.split('T')[0] : shift.startDate;
        
if (shiftDateClean === targetDateStr) {
      let isBlitz = shift.empName && shift.empName.includes('Blitz');
      
      if (!isBlitz) {
        // A regular crew member is taking this day off
        workingToday = workingToday.filter(name => name !== shift.empName);
        // THE FIX: Only add them if they aren't already on the list
        if (!offWorkers.includes(shift.empName)) {
          offWorkers.push(shift.empName);
        }
      }
      
      if (shift.status === "Claimed" && shift.claimedBy) {
        // Someone picked up a shift! 
        // THE FIX: Only add them if they aren't already on the list
        if (!blitzWorkers.includes(shift.claimedBy)) {
          blitzWorkers.push(shift.claimedBy);
        }
      }
    }
  });

      // 3. Display the results on the UI
      const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      document.getElementById('roster-date').innerText = `Crew for ${monthNames[month]} ${day}`;
      
      const rosterList = document.getElementById('roster-list');
      rosterList.innerHTML = '';

      // Add regular crew
      workingToday.forEach(name => {
        rosterList.innerHTML += `<li>• ${name}</li>`;
      });

      // Add blitz workers who claimed a shift
      blitzWorkers.forEach(name => {
        rosterList.innerHTML += `<li>• ${name} <span class="blitz-tag">Blitz Pickup</span></li>`;
      });

      // Show who has the day off at the bottom
      offWorkers.forEach(name => {
        rosterList.innerHTML += `<li>• <del>${name}</del> <span class="off-tag">(Time Off)</span></li>`;
      });

      document.getElementById('roster-display').style.display = 'block';
    }

    // Fire it up
    window.onload = initCalendar;
  </script>
</body>
</html>
